<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>공문서 작성 도우미</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f6f9;color:#2c3e50;font-size:14px;height:100vh;overflow:hidden}

/* ── 상단 헤더 ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#fff;border-bottom:1px solid #e0e0e0;box-shadow:0 2px 4px rgba(0,0,0,.06);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:8px}
.app-title{font-size:1rem;font-weight:700;color:#2c3e50}

/* ── 템플릿 버튼 ── */
.tpl-btn{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#f8f9fa;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.tpl-btn:hover{background:#e8f4fd;border-color:#3498db}
.tpl-btn.active{background:#3498db;color:#fff;border-color:#3498db}

/* ── 공지바 ── */
.notice-bar{background:#fff8e1;border-bottom:1px solid #ffe082;padding:4px 16px;font-size:.78rem;color:#7c6000;flex-shrink:0}

/* ── 메인 3단 그리드 ── */
.main-grid{display:grid;grid-template-columns:340px 1fr 260px;gap:0;height:calc(100vh - 72px);overflow:hidden}

/* ── 좌측 입력 패널 ── */
.input-panel{background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #e8e8e8;font-size:.82rem;font-weight:700;color:#555;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:12px 14px}
.panel-footer{padding:10px 14px;border-top:1px solid #e8e8e8;background:#f8f9fa;display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* ── 폼 필드 ── */
.field-group{margin-bottom:12px}
.field-label{display:block;font-size:.78rem;font-weight:700;color:#555;margin-bottom:4px}
.field-input{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85rem;font-family:inherit;transition:border .15s;resize:vertical}
.field-input:focus{outline:none;border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,.12)}
textarea.field-input{min-height:70px}

/* ── Rich 에디터 ── */
.rich-toolbar{display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap}
.rich-toolbar button{padding:3px 8px;border:1px solid #ddd;border-radius:4px;background:#f8f9fa;font-size:.78rem;cursor:pointer;transition:background .12s}
.rich-toolbar button:hover{background:#e3f0fb;border-color:#3498db}
.rich-editor{width:100%;min-height:120px;max-height:300px;overflow-y:auto;padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:.85rem;font-family:inherit;line-height:1.7;background:#fff;transition:border .15s}
.rich-editor:focus{outline:none;border-color:#3498db;box-shadow:0 0 0 2px rgba(52,152,219,.12)}
.rich-editor[data-placeholder]:empty:before{content:attr(data-placeholder);color:#bbb;pointer-events:none}

/* ── 표 CSS (편집기 내) ── */
.rich-editor table{border-collapse:collapse;width:100%;margin:8px 0;table-layout:auto;font-size:0.88rem}
.rich-editor th{background:#eaf2fb;border:1.5px solid #2c3e50;padding:6px 10px;font-weight:700;text-align:center;vertical-align:middle;color:#1a252f;line-height:1.5}
.rich-editor td{background:#fff;border:1px solid #aab7c4;padding:6px 10px;vertical-align:middle;color:#2c3e50;line-height:1.5}
.rich-editor tr:nth-child(even) td{background:#f8fbff}

/* ── 버튼 ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border:none;border-radius:7px;font-size:.83rem;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-primary{background:#3498db;color:#fff}
.btn-primary:hover{background:#2980b9}
.btn-secondary{background:#ecf0f1;color:#2c3e50;border:1px solid #ddd}
.btn-secondary:hover{background:#dde4e9}
.btn-success{background:#27ae60;color:#fff}
.btn-success:hover{background:#219a52}
.btn-warning{background:#f39c12;color:#fff}
.btn-warning:hover{background:#d68910}
.btn-sm{padding:5px 11px;font-size:.8rem}

/* ── 가운데 생성 문서 ── */
.output-panel{background:#f0f2f5;display:flex;flex-direction:column;overflow:hidden}
.output-panel .panel-header{background:#f0f2f5;border-bottom:1px solid #dde2e8}
.output-panel .panel-body{padding:12px;flex:1;overflow-y:auto}
#preview-output{width:100%;height:100%;min-height:400px;padding:16px;border:1px solid #dde2e8;border-radius:6px;background:#fff;font-family:'Noto Sans KR',monospace;font-size:.82rem;line-height:1.9;resize:none;color:#2c3e50}

/* ── 우측 검사 패널 ── */
.check-panel{background:#fff;border-left:1px solid #e0e0e0;display:flex;flex-direction:column;overflow:hidden}
.check-panel .panel-body{padding:10px 12px}
.check-section{margin-bottom:14px}
.check-section-title{font-size:.78rem;font-weight:700;color:#555;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eee}
.check-item{display:flex;align-items:flex-start;gap:6px;padding:4px 0;font-size:.78rem;color:#444;border-bottom:1px solid #f5f5f5}
.check-item:last-child{border-bottom:none}
.check-icon{font-size:.85rem;flex-shrink:0;margin-top:1px}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.72rem;font-weight:700}
.badge-ok{background:#e8f8f0;color:#1e8449}
.badge-warn{background:#fef9e7;color:#7d6608}
.badge-error{background:#fdf2f0;color:#922b21}
.badge-draft{background:#eaf2fb;color:#1a5276}

/* ── 저장 상태 ── */
#save-status{font-size:.75rem;color:#888;margin-left:4px}

/* ── 토스트 ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:8px;background:#2c3e50;color:#fff;font-size:.82rem;box-shadow:0 4px 12px rgba(0,0,0,.18);animation:fadeInUp .25s ease}
.toast.success{background:#27ae60}
.toast.error{background:#e74c3c}
.toast.warning{background:#f39c12}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── 표 삽입 팝업 ── */
.table-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid #ddd;border-radius:10px;padding:20px 24px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.18);flex-direction:column;gap:12px;min-width:220px}
.table-popup h4{font-size:.9rem;font-weight:700;margin-bottom:4px}
.table-popup label{font-size:.8rem;color:#555}
.table-popup input{width:60px;padding:4px 8px;border:1px solid #ddd;border-radius:5px;font-size:.85rem;margin-left:8px}
.table-popup-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* ── 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:2000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px 28px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18)}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:14px}
.modal-close{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#888}
.modal p,.modal li{font-size:.83rem;line-height:1.7;color:#444}
.modal ul{padding-left:18px}
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<div class="header">
  <div class="header-left">
    <span class="app-title">📄 공문서 작성 도우미</span>
    <button class="tpl-btn active" data-tpl="internal">🏢 내부결재</button>
    <button class="tpl-btn" data-tpl="government">🏛 지자체</button>
    <button class="tpl-btn" data-tpl="cooperation">🤝 협조</button>
    <button class="tpl-btn" data-tpl="sponsor">💝 후원</button>
    <button class="tpl-btn" data-tpl="event">📅 행사</button>
  </div>
  <div class="header-right">
    <span id="save-status">새 문서</span>
    <button class="btn btn-secondary btn-sm" id="btn-example">예시</button>
    <button class="btn btn-primary btn-sm" id="btn-save">💾 저장</button>
  </div>
</div>

<!-- ── 공지바 ── -->
<div class="notice-bar">
  💡 <b>작성 가이드:</b> 제목은 간결하게, 본문은 육하원칙에 따라 작성하세요.
</div>

<!-- ── 메인 3단 그리드 ── -->
<div class="main-grid">

  <!-- 좌측: 입력 패널 -->
  <div class="input-panel">
    <div class="panel-header">✏️ 문서 작성</div>
    <div class="panel-body">
      <div id="form-fields"></div>
    </div>
    <div class="panel-footer">
      <!-- 표 조작 버튼 -->
      <button class="btn btn-secondary btn-sm" id="btn-add-row">↓ 행 추가</button>
      <button class="btn btn-secondary btn-sm" id="btn-add-col">→ 열 추가</button>
      <button class="btn btn-secondary btn-sm" id="btn-del-row">✕ 행 삭제</button>
      <button class="btn btn-secondary btn-sm" id="btn-del-col">✕ 열 삭제</button>
      <button class="btn btn-secondary btn-sm" id="btn-merge">□ 병합</button>
      <button class="btn btn-secondary btn-sm" id="btn-unmerge">⊟ 분리</button>
    </div>
  </div>

  <!-- 가운데: 생성된 문서 -->
  <div class="output-panel">
    <div class="panel-header">
      📄 생성된 문서
    </div>
    <div class="panel-body">
      <textarea id="preview-output" readonly placeholder="좌측에서 내용을 입력하면 문서가 실시간으로 생성됩니다."></textarea>
    </div>
  </div>

  <!-- 우측: 실시간 검사 패널 -->
  <div class="check-panel">
    <div class="panel-header">🔍 실시간 검사</div>
    <div class="panel-body">
      <div class="check-section">
        <div class="check-section-title">맞춤법</div>
        <div id="spell-results"><span style="color:#bbb;font-size:.78rem">입력 후 자동 검사</span></div>
      </div>
      <div class="check-section">
        <div class="check-section-title">규칙 검사</div>
        <div id="rule-results"><span style="color:#bbb;font-size:.78rem">입력 후 자동 검사</span></div>
      </div>
      <div class="check-section">
        <div class="check-section-title">순화어</div>
        <div id="purify-results"><span style="color:#bbb;font-size:.78rem">입력 후 자동 검사</span></div>
      </div>
    </div>
    <div class="panel-footer" style="flex-direction:column;gap:6px">
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-spell')">📝 맞춤법</button>
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-rule')">📋 규칙검사</button>
      <button class="btn btn-secondary btn-sm" onclick="openModal('modal-purify')">✨ 순화어</button>
      <button class="btn btn-success" id="btn-preview">👁 미리보기</button>
    </div>
  </div>

</div><!-- /.main-grid -->

<!-- ── 표 삽입 팝업 ── -->
<div class="table-popup" id="table-popup">
  <h4>표 삽입</h4>
  <div><label>행 수<input type="number" id="tbl-rows" value="3" min="1" max="20"></label></div>
  <div><label>열 수<input type="number" id="tbl-cols" value="3" min="1" max="10"></label></div>
  <div class="table-popup-btns">
    <button class="btn btn-secondary btn-sm" onclick="closeTablePopup()">취소</button>
    <button class="btn btn-primary btn-sm" id="btn-insert-table">삽입</button>
  </div>
</div>

<!-- ── 모달: 규칙검사 ── -->
<div class="modal-overlay" id="modal-rule">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-rule')">✕</button>
    <h3>📋 규칙 검사 결과</h3>
    <div id="modal-rule-body"><p>검사 결과가 없습니다.</p></div>
  </div>
</div>

<!-- ── 모달: 순화어 ── -->
<div class="modal-overlay" id="modal-purify">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-purify')">✕</button>
    <h3>✨ 순화어 제안</h3>
    <div id="modal-purify-body"><p>검사 결과가 없습니다.</p></div>
  </div>
</div>

<!-- ── 모달: 맞춤법 안내 ── -->
<div class="modal-overlay" id="modal-spell">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-spell')">✕</button>
    <h3>📝 맞춤법 검사 안내</h3>
    <p>맞춤법 검사는 부산대학교 맞춤법 검사기 또는 네이버 맞춤법 검사기를 이용하시기 바랍니다.</p>
    <br>
    <ul>
      <li><a href="https://speller.cs.pusan.ac.kr" target="_blank">부산대 맞춤법 검사기</a></li>
      <li><a href="https://search.naver.com/search.naver?query=맞춤법+검사기" target="_blank">네이버 맞춤법 검사기</a></li>
    </ul>
  </div>
</div>

<!-- ── 토스트 컨테이너 ── -->
<div class="toast-container" id="toast-container"></div>

<!-- ── 스크립트 ── -->
<script src="data/rules.js"></script>
<script src="data/templates.js"></script>
<script src="js/common.js"></script>
<script src="js/checker.js"></script>
<script src="js/editor.js"></script>

</body>
</html>
