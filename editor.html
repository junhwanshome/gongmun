            <div class="template-btns">

              <button class="template-btn"        data-template="government">🏛️ 지자체</button>
              <button class="template-btn"        data-template="cooperation">🤝 협조</button>
              <button class="template-btn"        data-template="sponsor">💝 후원</button>

            <span class="step-num">2</span>

  <!-- ════════════════════════════════════════════
       스크립트 로드
  ════════════════════════════════════════════ -->
  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checker.js"></script>

  <!-- ════════════════════════════════════════════
       안전장치: common.js 로드 실패 대비
       필요한 함수가 없으면 여기서 직접 정의
  ════════════════════════════════════════════ -->
  <script>

    /* ── getUrlParams ── */
    if (typeof getUrlParams === 'undefined') {
      function getUrlParams() {
        var params = {};
        var search = window.location.search;
        if (!search) return params;
        var pairs = search.substring(1).split('&');
        for (var i = 0; i < pairs.length; i++) {
          var pair = pairs[i].split('=');
          if (pair.length === 2) {
            try {
              params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
            } catch(e) {}
          }
        }
        return params;
      }
    }

    /* ── generateId ── */
    if (typeof generateId === 'undefined') {
      function generateId(prefix) {
        prefix = prefix || 'id';
        return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      }
    }

    /* ── escapeHtml ── */
    if (typeof escapeHtml === 'undefined') {
      function escapeHtml(str) {
        if (!str) return '';
        return String(str)
          .replace(/&/g,  '&amp;')
          .replace(/</g,  '&lt;')
          .replace(/>/g,  '&gt;')
          .replace(/"/g,  '&quot;')
          .replace(/'/g,  '&#39;');
      }
    }

    /* ── getTodayString ── */
    if (typeof getTodayString === 'undefined') {
      function getTodayString() {
        var d = new Date();
        return d.getFullYear() + '. ' + (d.getMonth() + 1) + '. ' + d.getDate() + '.';
      }
    }

    /* ── formatDateShort ── */
    if (typeof formatDateShort === 'undefined') {
      function formatDateShort(date) {
        if (!date) date = new Date();
        var m  = String(date.getMonth() + 1).padStart(2, '0');
        var d  = String(date.getDate()).padStart(2, '0');
        var hh = String(date.getHours()).padStart(2, '0');
        var mm = String(date.getMinutes()).padStart(2, '0');
        return m + '/' + d + ' ' + hh + ':' + mm;
      }
    }

    /* ── showToast ── */
    if (typeof showToast === 'undefined') {
      function showToast(message, type) {
        type = type || 'info';
        var container = document.getElementById('toast-container');
        if (!container) {
          container = document.createElement('div');
          container.id = 'toast-container';
          container.style.cssText =
            'position:fixed;bottom:24px;right:24px;z-index:9999;' +
            'display:flex;flex-direction:column;gap:8px;';
          document.body.appendChild(container);
        }
        var toast = document.createElement('div');
        toast.textContent = message;
        var bg = { success:'#27ae60', error:'#e74c3c', warning:'#f39c12', info:'#3498db' };
        toast.style.cssText =
          'padding:10px 18px;border-radius:8px;font-size:0.88rem;font-weight:500;' +
          'color:#fff;background:' + (bg[type] || bg.info) + ';' +
          'box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:200px;' +
          'max-width:340px;font-family:inherit;margin-bottom:4px;';
        container.appendChild(toast);
        setTimeout(function() {
          if (toast.parentNode) toast.parentNode.removeChild(toast);
        }, 3000);
      }
    }

    /* ── copyToClipboard ── */
    if (typeof copyToClipboard === 'undefined') {
      function copyToClipboard(text) {
        if (!text) return;
        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0;';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch(e) {}
          document.body.removeChild(ta);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).catch(fallback);
        } else {
          fallback();
        }
      }
    }

    /* ── Modal ── */
    if (typeof Modal === 'undefined') {
      var Modal = {
        open:  function(id) { var el = document.getElementById(id); if (el) el.style.display = 'flex'; },
        close: function(id) { var el = document.getElementById(id); if (el) el.style.display = 'none'; }
      };
    }

    /* ── Storage ── */
    if (typeof Storage === 'undefined' || typeof Storage.getSettings !== 'function') {
      var Storage = {
        getSettings: function() {
          try {
            var s = localStorage.getItem('doc_settings');
            return s ? JSON.parse(s) : {
              orgName: '',
              approvalLevels: [
                { title:'담당', name:'' },
                { title:'과장', name:'' },
                { title:'관장', name:'' }
              ],
              receivers: []
            };
          } catch(e) {
            return { orgName:'', approvalLevels:[], receivers:[] };
          }
        },
        saveSettings: function(s) {
          try { localStorage.setItem('doc_settings', JSON.stringify(s)); return true; }
          catch(e) { return false; }
        },
        getAllDrafts: function() {
          try {
            var list = [];
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i);
              if (key && key.indexOf('draft_') === 0) {
                var item = JSON.parse(localStorage.getItem(key));
                if (item) list.push(item);
              }
            }
            return list.sort(function(a,b){ return new Date(b.savedAt)-new Date(a.savedAt); });
          } catch(e) { return []; }
        },
        getDraft: function(id) {
          try {
            var item = localStorage.getItem('draft_'+id) || localStorage.getItem(id);
            return item ? JSON.parse(item) : null;
          } catch(e) { return null; }
        },
        saveDraft: function(draft) {
          try {
            localStorage.setItem('draft_'+draft.id, JSON.stringify(draft));
            return true;
          } catch(e) { return false; }
        },
        deleteDraft: function(id) {
          try {
            localStorage.removeItem('draft_'+id);
            localStorage.removeItem(id);
            return true;
          } catch(e) { return false; }
        },
        getAllDocs: function() {
          try {
            var list = [];
            var skip = ['doc_settings','doc_logo','doc_org_detail','doc_cooperators'];
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i);
              if (key && key.indexOf('doc_') === 0 && skip.indexOf(key) === -1) {
                var item = JSON.parse(localStorage.getItem(key));
                if (item) list.push(item);
              }
            }
            return list.sort(function(a,b){
              return new Date(b.completedAt||b.savedAt) - new Date(a.completedAt||a.savedAt);
            });
          } catch(e) { return []; }
        },
        getDoc: function(id) {
          try {
            var item = localStorage.getItem('doc_'+id) || localStorage.getItem(id);
            return item ? JSON.parse(item) : null;
          } catch(e) { return null; }
        },
        saveDoc: function(doc) {
          try {
            var key = doc.id.indexOf('doc_') === 0 ? doc.id : 'doc_'+doc.id;
            localStorage.setItem(key, JSON.stringify(doc));
            return true;
          } catch(e) { return false; }
        },
        deleteDoc: function(id) {
          try {
            localStorage.removeItem('doc_'+id);
            localStorage.removeItem(id);
            return true;
          } catch(e) { return false; }
        }
      };
    }

    /* ── ExtendedStorage ── */
    if (typeof ExtendedStorage === 'undefined') {
      var ExtendedStorage = {
        getOrgDetail: function() {
          try {
            var s = localStorage.getItem('doc_org_detail');
            return s ? JSON.parse(s) : {
              zipCode:'', address:'', homepage:'',
              tel:'', fax:'', email:'', disclosure:''
            };
          } catch(e) {
            return { zipCode:'', address:'', homepage:'', tel:'', fax:'', email:'', disclosure:'' };
          }
        },
        saveOrgDetail: function(d) {
          try { localStorage.setItem('doc_org_detail', JSON.stringify(d)); return true; }
          catch(e) { return false; }
        }
      };
    }

  </script>

  <!-- ════ editor.js 로드 (안전장치 스크립트 다음에 로드) ════ -->
  <script src="js/editor.js"></script>

  <!-- ════ 버튼 이벤트 바인딩 ════ -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {

      /* 기관명 미설정 경고 */
      var settings = Storage.getSettings();
      var notice   = document.getElementById('org-name-notice');
      if (notice && !settings.orgName) notice.style.display = 'flex';

      /* 맞춤법 검사 버튼 */
      var spellBtn = document.getElementById('spell-check-btn');
      if (spellBtn) {
        spellBtn.onclick = function() {
          var editor = document.getElementById('editor-content');
          if (editor && editor.value.trim()) {
            copyToClipboard(editor.value);
            showToast('클립보드에 복사되었습니다! 📋', 'success');
          }
          Modal.open('spell-guide-modal');
        };
      }

      /* 나라 맞춤법 검사기 열기 */
      var openSpellerBtn = document.getElementById('open-speller-btn');
      if (openSpellerBtn) {
        openSpellerBtn.onclick = function() {
          window.open(
            'https://www.nara-speller.co.kr/speller/',
            'speller',
            'width=900,height=650,scrollbars=yes,resizable=yes'
          );
          Modal.close('spell-guide-modal');
        };
      }

      /* 규칙 검사 버튼 */
      var ruleCheckBtn = document.getElementById('rule-check-btn');
      if (ruleCheckBtn) {
        ruleCheckBtn.onclick = function() {
          if (typeof openCheckModal === 'function') openCheckModal();
          else showToast('checker.js 로드를 확인해주세요.', 'error');
        };
      }

      /* 자동수정 버튼 */
      var autoFixBtn = document.getElementById('auto-fix-btn');
      if (autoFixBtn) {
        autoFixBtn.onclick = function() {
          if (typeof applyAutoFix === 'function') applyAutoFix();
        };
      }

      /* 순화어 버튼 */
      var purifyBtn = document.getElementById('purify-btn');
      if (purifyBtn) {
        purifyBtn.onclick = function() {
          if (typeof openPurifyModal === 'function') openPurifyModal();
          else showToast('checker.js 로드를 확인해주세요.', 'error');
        };
      }

      /* 미리보기 버튼 */
      var previewBtn = document.getElementById('preview-btn');
      if (previewBtn) {
        previewBtn.onclick = function() {
          if (typeof goToPreview === 'function') goToPreview();
          else showToast('editor.js 로드를 확인해주세요.', 'error');
        };
      }

      /* 모달 닫기 버튼 전체 */
      document.querySelectorAll('.modal-close-btn, .modal-cancel-btn').forEach(function(btn) {
        btn.onclick = function() {
          var modal = btn.closest('.modal-overlay');
          if (modal) Modal.close(modal.id);
        };
      });

    });
  </script>

      width: 100%; font-family: 'Noto Sans KR', monospace;
      font-size: 0.9rem; line-height: 1.8;
      border: 1px solid #ddd; border-radius: 8px;
      padding: 12px; resize: vertical;
      min-height: 300px; box-sizing: border-box; color: #2c3e50;
    }
    .editor-textarea:focus {
      outline: none; border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,.15);
    }

    .editor-footer {
      display: flex; gap: 10px; flex-wrap: wrap;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 10px; padding: 12px;
    }

    .realtime-panel {
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 10px; padding: 14px;
      max-height: calc(100vh - 120px); overflow-y: auto;
    }
    .check-panel-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee;
    }
    .check-panel-title { font-weight: 700; font-size: 0.95rem; color: #2c3e50; }
    .check-empty       { text-align: center; padding: 20px; color: #999; }
    .check-empty-icon  { font-size: 2rem; margin-bottom: 8px; }
    .check-list        { display: flex; flex-direction: column; gap: 8px; }
    .check-item        { border-radius: 6px; padding: 10px; font-size: 0.83rem; }
    .check-item-error  { background: #fdf2f2; border-left: 3px solid #e74c3c; }
    .check-item-warning{ background: #fffbf0; border-left: 3px solid #f39c12; }
    .check-item-info   { background: #f0f7ff; border-left: 3px solid #3498db; }
    .check-item-header { display: flex; gap: 6px; align-items: flex-start; margin-bottom: 4px; font-weight: 500; }
    .check-desc        { color: #666; font-size: 0.8rem; margin-top: 4px; }
    .check-fix         { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 0.82rem; flex-wrap: wrap; }
    .check-original    { background: #fde8e8; padding: 2px 7px; border-radius: 3px; }
    .check-arrow       { color: #aaa; font-weight: 700; }
    .check-suggestion  { background: #e8f5e9; padding: 2px 7px; border-radius: 3px; }
    .check-summary-badges { display: flex; gap: 4px; flex-wrap: wrap; }

    .spell-guide-steps { display: flex; flex-direction: column; gap: 14px; }
    .spell-step        { display: flex; align-items: flex-start; gap: 12px; font-size: 0.9rem; }
    .step-num {
      background: #3498db; color: #fff;
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.82rem; font-weight: 700; flex-shrink: 0;
    }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 16px;
    }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 24px;
      width: 100%; max-width: 520px; max-height: 88vh;
      display: flex; flex-direction: column; gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.18);
    }
    .modal-lg    { max-width: 720px; }
    .modal-header{
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 12px; border-bottom: 1px solid #eee;
    }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; margin: 0; }
    .modal-close-btn {
      background: none; border: none; font-size: 1.1rem;
      cursor: pointer; color: #888; padding: 0 4px;
    }
    .modal-close-btn:hover { color: #333; }
    .modal-body   { overflow-y: auto; flex: 1; font-size: 0.9rem; line-height: 1.7; }
    .modal-footer {
      display: flex; justify-content: flex-end; gap: 10px;
      padding-top: 12px; border-top: 1px solid #eee;
    }

    .purify-summary     { margin-bottom: 14px; font-size: 0.9rem; }
    .purify-group       { margin-bottom: 20px; }
    .purify-group-title { font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; }
    .purify-table       { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .purify-table th    { background: #f0f4f8; border: 1px solid #ddd; padding: 7px 10px; font-weight: 600; text-align: left; }
    .purify-table td    { border: 1px solid #ddd; padding: 7px 10px; vertical-align: middle; }
    .purify-original    { background: #fde8e8; padding: 2px 6px; border-radius: 4px; font-size: 0.83rem; }
    .purify-replace     { background: #e8f5e9; padding: 2px 6px; border-radius: 4px; font-size: 0.83rem; }
    .purify-desc        { color: #666; font-size: 0.8rem; }

    .check-group        { margin-bottom: 20px; }
    .check-group-title  { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .check-group-list   { display: flex; flex-direction: column; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 16px; border: none; border-radius: 7px;
      font-size: 0.88rem; font-weight: 500; cursor: pointer;
      transition: background .15s, transform .1s;
      text-decoration: none; white-space: nowrap;
      font-family: inherit; line-height: 1;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary         { background: #3498db; color: #fff; }
    .btn-primary:hover   { background: #2980b9; color: #fff; }
    .btn-secondary       { background: #ecf0f1; color: #2c3e50; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #dde4e6; }
    .btn-danger          { background: #e74c3c; color: #fff; }
    .btn-danger:hover    { background: #c0392b; }
    .btn-sm { padding: 5px 11px; font-size: 0.82rem; }

    .badge         { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.76rem; font-weight: 600; }
    .badge-success { background: #e8f8f0; color: #27ae60; }
    .badge-warning { background: #fef9e7; color: #f39c12; }
    .badge-error   { background: #fdf2f2; color: #e74c3c; }
    .badge-info    { background: #eaf4fb; color: #3498db; }

    kbd {
      font-size: 0.74rem; background: #eee; border: 1px solid #ccc;
      padding: 1px 5px; border-radius: 3px; font-family: monospace;
    }

    .toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 8px;
    }

    @media (max-width: 1100px) { .editor-layout { grid-template-columns: 1fr 260px; } }
    @media (max-width: 900px)  {
      .editor-layout { grid-template-columns: 1fr; }
      .editor-right  { position: static; }
      .realtime-panel{ max-height: 280px; }
    }
    @media (max-width: 600px)  {
      .editor-layout  { padding: 12px; gap: 12px; }
      .template-btn   { font-size: 0.75rem; padding: 4px 8px; }
      .editor-footer  { flex-direction: column; }
      .editor-footer .btn { width: 100%; justify-content: center; }
      .field-row-half { grid-template-columns: 1fr; }
    }
    @media print {
      .editor-toolbar, .guide-panel, .form-fields-area,
      .editor-footer, .editor-right,
      .modal-overlay, .notice-bar,
      header, nav { display: none !important; }
    }
  </style>

</body>
</html>
