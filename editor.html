<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 작성 - 공문서 작성 도우미</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="header-logo">
          <span>🏛️</span>
          공문서 작성 도우미
        </a>
        <nav class="header-nav">
          <a href="index.html">🏠 홈</a>
          <a href="editor.html">✍️ 새 문서</a>
          <a href="settings.html">⚙️ 기관설정</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- 에디터 페이지 -->
  <div class="editor-page">

    <!-- 툴바 -->
    <div class="editor-toolbar">

      <!-- 왼쪽: 뒤로가기 + 템플릿 선택 -->
      <div class="editor-toolbar-left">
        <a href="index.html" class="btn btn-sm btn-outline">
          ← 뒤로
        </a>
        <div class="template-selector">
          <button class="template-btn active"
            data-template="internal">
            📋 내부결재
          </button>
          <button class="template-btn"
            data-template="government">
            🏛️ 지자체보고
          </button>
          <button class="template-btn"
            data-template="cooperation">
            🤝 타기관협조
          </button>
          <button class="template-btn"
            data-template="sponsor">
            💝 후원자감사
          </button>
          <button class="template-btn"
            data-template="event">
            📢 행사안내
          </button>
        </div>
      </div>

      <!-- 오른쪽: 저장상태 + 예시 + 저장 -->
      <div class="editor-toolbar-right">
        <div class="save-status" id="save-status">
          <span>●</span> 미저장
        </div>
        <button class="btn btn-sm btn-outline"
          id="fill-example-btn">
          📝 예시채우기
        </button>
        <button class="btn btn-sm btn-primary"
          id="save-draft-btn">
          💾 임시저장
          <span style="font-size:10px;opacity:0.8">
            (Ctrl+S)
          </span>
        </button>
      </div>

    </div>

    <!-- 에디터 본문 -->
    <div class="editor-body">

      <!-- 왼쪽: 폼 + 에디터 -->
      <div class="editor-main">
        <div class="editor-form">

          <!-- 가이드 패널 -->
          <div id="guide-panel"></div>

          <!-- 입력 폼 -->
          <div id="form-fields">
            <!-- js로 렌더링 -->
          </div>

          <!-- 구분선 -->
          <hr class="divider">

          <!-- 생성된 공문서 텍스트 -->
          <div class="form-group">
            <label class="form-label">
              📄 생성된 공문서
              <span style="font-size:11px;
                font-weight:400;color:var(--gray-500);
                margin-left:8px">
                직접 수정도 가능해요
              </span>
            </label>
            <textarea
              class="editor-textarea"
              id="editor-content"
              placeholder="왼쪽 항목을 입력하면 자동으로 생성돼요"
              rows="20"
            ></textarea>
          </div>

        </div>
      </div>

      <!-- 오른쪽: 실시간 체크 패널 -->
      <div class="editor-side">
        <div class="side-panel-header">
          🔍 실시간 규칙 체크
          <span id="check-summary"
            style="float:right;font-weight:400">
          </span>
        </div>
        <div class="side-panel-body"
          id="realtime-check-panel">
          <div class="check-item"
            style="background:var(--gray-100);
              border-left:3px solid var(--gray-400)">
            <div class="check-item-title">
              ℹ️ 안내
            </div>
            <div class="check-item-desc">
              내용을 입력하면 자동으로 규칙을 검사해요
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- 하단 버튼 바 -->
    <div class="editor-footer">

      <!-- 왼쪽: 검사 버튼들 -->
      <div class="editor-footer-left">
        <button class="btn btn-outline"
          id="spell-check-btn"
          title="나라 맞춤법 검사기 팝업 열기">
          🔤 맞춤법 검사
        </button>
        <button class="btn btn-outline"
          id="rule-check-btn"
          title="공문서 규칙 전체 검사">
          📋 규칙 검사
        </button>
        <button class="btn btn-outline"
          id="purify-btn"
          title="어려운 한자어/외래어 순화">
          📖 순화어
        </button>
      </div>

      <!-- 오른쪽: 미리보기 -->
      <div class="editor-footer-right">
        <button class="btn btn-primary"
          id="preview-btn"
          title="미리보기 (Ctrl+Enter)">
          👁️ 미리보기
          <span style="font-size:10px;opacity:0.8">
            (Ctrl+Enter)
          </span>
        </button>
      </div>

    </div>

  </div>

  <!-- =====================
       모달들
       ===================== -->

  <!-- 규칙 검사 모달 -->
  <div class="modal-overlay" id="check-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">
          📋 공문서 규칙 검사 결과
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="check-modal-body">
        <!-- js로 렌더링 -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-success"
          id="auto-fix-btn"
          style="display:none">
          ✨ 자동 수정
        </button>
        <button class="btn btn-outline modal-close">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- 순화어 모달 -->
  <div class="modal-overlay" id="purify-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">
          📖 순화어 안내
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body" id="purify-modal-body">
        <!-- js로 렌더링 -->
      </div>
      <div class="modal-footer">
        <div style="font-size:12px;color:var(--gray-500);
          flex:1">
          💡 행을 클릭하면 자동으로 바꿔줘요
        </div>
        <button class="btn btn-outline modal-close">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- 맞춤법 안내 모달 -->
  <div class="modal-overlay" id="spell-guide-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <div class="modal-title">
          🔤 맞춤법 검사 안내
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center;padding:8px 0">
          <div style="font-size:40px;margin-bottom:16px">
            🔤
          </div>
          <p style="font-size:15px;font-weight:600;
            margin-bottom:12px">
            나라 맞춤법 검사기를 이용해요
          </p>
          <div style="background:var(--gray-100);
            border-radius:var(--border-radius);
            padding:16px;text-align:left;
            font-size:13px;margin-bottom:16px">
            <div style="margin-bottom:8px">
              <strong>📋 사용 방법</strong>
            </div>
            <ol style="padding-left:16px;
              line-height:2">
              <li>아래 버튼을 클릭해요</li>
              <li>팝업창이 열려요</li>
              <li>공문서 내용을 붙여넣기 해요
                <br>
                <span style="color:var(--primary);
                  font-size:12px">
                  (텍스트가 자동 복사되어 있어요!)
                </span>
              </li>
              <li>검사하기 버튼을 눌러요</li>
              <li>결과 확인 후 수정해요</li>
            </ol>
          </div>
          <button class="btn btn-primary btn-block"
            onclick="
              Modal.close('spell-guide-modal');
              openSpellCheckerPopup();
            ">
            🔤 맞춤법 검사기 열기
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checker.js"></script>
  <script src="js/editor.js"></script>

  <!-- 맞춤법 버튼 오버라이드 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // 맞춤법 버튼 클릭시 안내 모달 먼저 표시
      const spellBtn = document.getElementById(
        'spell-check-btn'
      );
      if (spellBtn) {
        spellBtn.removeEventListener('click',
          openSpellCheckerPopup
        );
        spellBtn.addEventListener('click', () => {
          const textarea = document.getElementById(
            'editor-content'
          );
          if (!textarea || !textarea.value.trim()) {
            showToast(
              '먼저 내용을 입력해주세요',
              'warning'
            );
            return;
          }
          // 텍스트 복사 후 안내 모달
          copyToClipboard(textarea.value);
          Modal.open('spell-guide-modal');
        });
      }

      // 기관명 표시
      const settings = Storage.getSettings();
      if (!settings.orgName) {
        const notice = document.createElement('div');
        notice.style.cssText = `
          background: #fff3cd;
          border: 1px solid #ffc107;
          border-radius: 6px;
          padding: 8px 12px;
          font-size: 12px;
          color: #856404;
          margin-bottom: 12px;
          display: flex;
          align-items: center;
          justify-content: space-between;
        `;
        notice.innerHTML = `
          <span>⚠️ 기관명이 설정되지 않았어요</span>
          <a href="settings.html"
            style="color:var(--primary);font-weight:600">
            설정하기 →
          </a>
        `;
        const formFields = document.getElementById(
          'form-fields'
        );
        if (formFields) {
          formFields.parentNode.insertBefore(
            notice,
            formFields
          );
        }
      }
    });
  </script>

  <!-- 단축키 안내 -->
  <style>
    /* 툴팁 */
    [title] {
      position: relative;
    }

    /* 에디터 폼 스크롤 */
    .editor-form {
      padding: 16px;
      overflow-y: auto;
      height: calc(100vh - 180px);
    }

    /* 실시간 체크 패널 스크롤 */
    .side-panel-body {
      overflow-y: auto;
      height: calc(100vh - 180px);
    }

    /* 모바일에서 사이드 패널 높이 조정 */
    @media (max-width: 768px) {
      .editor-form {
        height: auto;
        overflow-y: visible;
      }

      .side-panel-body {
        height: 200px;
      }
    }

    /* 저장 상태 애니메이션 */
    .save-status.saved {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* 자동 수정 버튼 강조 */
    #auto-fix-btn {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(40,167,69,0.4); }
      70% { box-shadow: 0 0 0 8px rgba(40,167,69,0); }
      100% { box-shadow: 0 0 0 0 rgba(40,167,69,0); }
    }
  </style>

</body>
</html>
