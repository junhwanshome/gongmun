<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미리보기 - 공문서 작성 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #111; }

    /* ── 헤더 ── */
    .header { background:#fff; border-bottom:1px solid #dde1e7; position:sticky; top:0; z-index:200; box-shadow:0 2px 8px rgba(0,0,0,.07); }
    .header-inner { max-width:1100px; margin:0 auto; padding:0 20px; height:56px; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-size:1.05rem; font-weight:700; color:#1a3a5c; text-decoration:none; }
    .nav { display:flex; gap:4px; }
    .nav-link { padding:6px 12px; border-radius:7px; font-size:.87rem; color:#555; text-decoration:none; transition:.15s; }
    .nav-link:hover { background:#f0f4f8; color:#1a3a5c; }
    .nav-link.active { background:#1a3a5c; color:#fff; }

    /* ── 툴바 ── */
    .preview-toolbar {
      max-width:860px; margin:20px auto 0; padding:12px 20px;
      background:#fff; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.08);
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }
    .toolbar-title { flex:1; font-size:1rem; font-weight:600; color:#1a3a5c; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .doc-status-badge { padding:3px 10px; border-radius:12px; font-size:.75rem; font-weight:600; }
    .badge-draft    { background:#fff3cd; color:#856404; }
    .badge-complete { background:#d1edda; color:#155724; }

    /* ── 미리보기 래퍼 ── */
    .preview-wrap { max-width:860px; margin:16px auto 40px; }

    /* ── A4 문서 종이 ── */
    .doc-paper {
      background:#fff;
      width:100%;
      padding:60px 70px 80px;
      box-shadow:0 4px 24px rgba(0,0,0,.12);
      border-radius:4px;
      font-size:11pt;
      line-height:1.85;
      color:#111;
      font-family:'Noto Sans KR', sans-serif;
    }

    /* ══════════════════════════════════════
       1. 기관명 + 구분선을 하나의 블록으로
    ══════════════════════════════════════ */
    .doc-header-block {
      text-align: center;
      margin-bottom: 20px;    /* 구분선 아래 ~ 수신 사이 여백 */
    }
    .doc-classno {
      font-size:9pt; color:#666;
      text-align:left; margin-bottom:8px;
    }
    .doc-logo-wrap { display:inline-block; }
    .doc-logo-img  { max-height:72px; max-width:280px; object-fit:contain; }

    /* 기관명 텍스트 */
    .doc-org-name {
      display: inline-block;          /* 텍스트 너비만큼만 차지 → 아래 구분선도 같은 너비 */
      font-size: 22pt;
      font-weight: 700;
      letter-spacing: .12em;
      color: #111;
      padding-bottom: 6px;            /* 텍스트와 구분선 사이 간격 */
      border-bottom: 2px solid #111;  /* ★ 구분선을 기관명 텍스트 바로 아래에 border로 처리 ★ */
    }

    /* 2. 수신·경유·참조 */
    .doc-meta-area  { padding: 0 0 10px 0; }
    .doc-meta-row   { display:flex; gap:0; font-size:10.5pt; line-height:1.9; }
    .doc-meta-label { min-width:56px; font-weight:600; flex-shrink:0; color:#111; }
    .doc-meta-value { color:#111; }

    /* 3. 제목 */
    .doc-title-area {
      display:flex; align-items:baseline; gap:8px;
      font-size:12pt; padding:8px 0 14px;
    }
    .doc-title-label { font-weight:700; flex-shrink:0; font-size:12pt; }
    .doc-title-text  { font-weight:700; font-size:12pt; line-height:1.5; }

    /* 4. 본문 */
    .doc-body-area { font-size:10.5pt; line-height:1.9; color:#111; margin-bottom:4px; }
    .doc-body-item { display:flex; gap:8px; margin-bottom:4px; }
    .doc-body-num  { min-width:22px; font-weight:600; flex-shrink:0; }

    /* 행사 표 */
    .doc-event-table { width:100%; border-collapse:collapse; margin:10px 0 14px; font-size:10.5pt; }
    .doc-event-table th { background:#f5f5f5; border:1px solid #bbb; padding:6px 12px; width:90px; text-align:center; font-weight:600; }
    .doc-event-table td { border:1px solid #bbb; padding:6px 12px; }

    /* 5. 붙임 */
    .doc-attach-area  { margin:14px 0 10px; font-size:10.5pt; }
    .doc-attach-label { font-weight:700; margin-bottom:4px; }
    .doc-attach-item  { padding-left:18px; line-height:1.8; }
    .doc-end-mark { text-align:right; font-weight:700; font-size:11pt; margin:10px 0 28px; }

    /* 6. 발신명의 */
    .doc-sender-area { text-align:center; font-size:14pt; font-weight:700; letter-spacing:.1em; margin:28px 0 20px; }

    /* 7. 결재란 — 테두리 없음 */
    .doc-approval-area {
      display:flex; justify-content:flex-end;
      align-items:flex-start; gap:24px; margin:0 0 32px;
    }
    .doc-coop-block { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .doc-coop-title { font-size:9pt; color:#555; font-weight:600; }
    .doc-approval-row  { display:flex; gap:0; }
    .doc-approval-cell { display:flex; flex-direction:column; align-items:center; width:64px; padding:0 4px; }
    .doc-approval-title { font-size:9.5pt; font-weight:600; color:#222; text-align:center; padding-bottom:2px; }
    .doc-approval-sign  { display:block; width:100%; height:40px; }
    .doc-approval-name  { font-size:9.5pt; color:#333; text-align:center; padding-top:2px; }

    /* 8. 하단 정보선 */
    .doc-footer-area    { margin-top:16px; }
    .doc-footer-thick   { border:none; border-top:2px solid #111; margin:0; }
    .doc-footer-thin    { border:none; border-top:1px solid #aaa; margin:0 0 6px; }
    .doc-footer-content { display:flex; justify-content:space-between; font-size:9pt; color:#444; padding:4px 0; flex-wrap:wrap; gap:8px; }
    .doc-footer-left    { display:flex; flex-direction:column; gap:3px; }
    .doc-footer-right   { text-align:right; display:flex; flex-direction:column; gap:3px; font-size:9pt; }
    .doc-footer-numrow  { display:flex; gap:28px; font-size:9pt; }
    .doc-footer-addr    { font-size:9pt; color:#555; }

    /* ── 하단 액션 버튼 ── */
    .preview-bottom-actions {
      max-width:860px; margin:16px auto 0;
      display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    }

    /* ── 버튼 ── */
    .btn { display:inline-flex; align-items:center; gap:5px; padding:8px 18px; border:none; border-radius:7px; font-size:.87rem; font-weight:500; cursor:pointer; transition:background .15s,transform .1s; text-decoration:none; white-space:nowrap; font-family:inherit; line-height:1; }
    .btn:active      { transform:scale(.97); }
    .btn-primary     { background:#1a3a5c; color:#fff; }
    .btn-primary:hover   { background:#14304f; }
    .btn-success     { background:#28a745; color:#fff; }
    .btn-success:hover   { background:#218838; }
    .btn-secondary   { background:#eef1f5; color:#2c3e50; border:1px solid #d0d7df; }
    .btn-secondary:hover { background:#dde3ea; }
    .btn-danger      { background:#e74c3c; color:#fff; }
    .btn-danger:hover    { background:#c0392b; }
    .btn-sm          { padding:5px 12px; font-size:.82rem; }

    /* ── 모달 ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:9000; align-items:center; justify-content:center; }
    .modal-overlay.active { display:flex; }
    .modal-box { background:#fff; border-radius:12px; width:90%; max-width:420px; padding:28px 28px 22px; box-shadow:0 8px 40px rgba(0,0,0,.2); }
    .modal-box h3 { font-size:1.1rem; font-weight:700; margin-bottom:12px; color:#1a3a5c; }
    .modal-box p  { font-size:.9rem; color:#444; line-height:1.6; margin-bottom:20px; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; }

    /* ── 반응형 ── */
    @media (max-width:900px) { .doc-paper { padding:40px 32px 60px; } }
    @media (max-width:600px) {
      .doc-paper { padding:24px 16px 40px; font-size:10pt; }
      .doc-org-name { font-size:16pt; }
      .doc-title-text, .doc-title-label { font-size:11pt; }
      .preview-toolbar { flex-direction:column; align-items:flex-start; }
    }

    /* ── 인쇄 ── */
    @media print {
      .no-print, .header, .preview-toolbar, .preview-bottom-actions { display:none !important; }
      body { background:#fff; }
      .preview-wrap { max-width:100%; margin:0; padding:0; }
      .doc-paper { box-shadow:none; border-radius:0; padding:25mm 20mm 20mm 25mm; font-size:10pt; width:100%; }
      @page { size:A4; margin:0; }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header class="header no-print">
  <div class="header-inner">
    <a href="index.html" class="logo">🏛️ 공문서 작성 도우미</a>
    <nav class="nav">
      <a href="index.html"    class="nav-link">🏠 홈</a>
      <a href="editor.html"   class="nav-link">✍️ 새 문서</a>
      <a href="settings.html" class="nav-link">⚙️ 기관설정</a>
    </nav>
  </div>
</header>

<!-- 툴바 -->
<div class="preview-toolbar no-print">
  <button id="back-btn"     class="btn btn-secondary btn-sm">← 목록</button>
  <span   id="preview-title" class="toolbar-title">미리보기</span>
  <span   id="doc-status"   class="doc-status-badge badge-draft">📝 임시저장</span>
  <button id="edit-btn"     class="btn btn-secondary btn-sm">✏️ 수정</button>
  <button id="copy-btn"     class="btn btn-secondary btn-sm">📋 복사</button>
  <button id="print-btn"    class="btn btn-secondary btn-sm">🖨️ 인쇄</button>
  <button id="complete-btn" class="btn btn-success   btn-sm">✅ 완성 저장</button>
  <button id="delete-btn"   class="btn btn-danger    btn-sm">🗑️ 삭제</button>
</div>

<!-- 문서 미리보기 -->
<div class="preview-wrap">
  <div id="doc-preview" class="doc-paper">
    <p style="text-align:center;color:#888;padding:60px 0;">문서를 불러오는 중…</p>
  </div>
</div>

<!-- 하단 버튼 -->
<div class="preview-bottom-actions no-print">
  <button id="edit-btn-b"     class="btn btn-secondary">✏️ 수정하기</button>
  <button id="copy-btn-b"     class="btn btn-secondary">📋 본문 복사</button>
  <button id="print-btn-b"    class="btn btn-secondary">🖨️ 인쇄</button>
  <button id="complete-btn-b" class="btn btn-success">✅ 완성 저장</button>
  <button id="delete-btn-b"   class="btn btn-danger">🗑️ 삭제</button>
</div>

<!-- 모달: 완성 저장 -->
<div class="modal-overlay" id="complete-modal">
  <div class="modal-box">
    <h3>✅ 완성 문서로 저장</h3>
    <p>이 문서를 완성 문서함으로 이동하시겠습니까?<br>임시저장본은 삭제됩니다.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="complete-cancel-btn">취소</button>
      <button class="btn btn-success"   id="complete-confirm-btn">저장</button>
    </div>
  </div>
</div>

<!-- 모달: 삭제 확인 -->
<div class="modal-overlay" id="delete-modal">
  <div class="modal-box">
    <h3>🗑️ 문서 삭제</h3>
    <p>이 문서를 영구 삭제하시겠습니까?<br>삭제된 문서는 복구할 수 없습니다.</p>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="delete-cancel-btn">취소</button>
      <button class="btn btn-danger"    id="delete-confirm-btn">삭제</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

<!-- 스크립트 -->
<script src="data/rules.js"></script>
<script src="data/templates.js"></script>
<script src="js/common.js"></script>

<!-- 안전장치 폴백 -->
<script>
(function () {
  if (typeof getUrlParams === 'undefined') {
    window.getUrlParams = function () {
      var p = {}, q = window.location.search.replace('?', '');
      if (!q) return p;
      q.split('&').forEach(function (pair) {
        var parts = pair.split('=');
        if (parts[0]) p[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
      });
      return p;
    };
  }
  if (typeof escapeHtml === 'undefined') {
    window.escapeHtml = function (str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    };
  }
  if (typeof getTodayString === 'undefined') {
    window.getTodayString = function () {
      var d = new Date();
      return d.getFullYear() + '. ' + (d.getMonth()+1) + '. ' + d.getDate() + '.';
    };
  }
  if (typeof showToast === 'undefined') {
    window.showToast = function (message, type) {
      type = type || 'info';
      var container = document.getElementById('toast-container');
      if (!container) { container = document.createElement('div'); container.id = 'toast-container'; document.body.appendChild(container); }
      var toast = document.createElement('div');
      toast.textContent = message;
      var bg = { success:'#27ae60', error:'#e74c3c', warning:'#e67e22', info:'#2980b9' };
      toast.style.cssText = 'padding:11px 20px;border-radius:8px;font-size:.88rem;font-weight:500;color:#fff;background:'+(bg[type]||bg.info)+';box-shadow:0 4px 18px rgba(0,0,0,.18);min-width:180px;max-width:320px;font-family:inherit;';
      container.appendChild(toast);
      setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3000);
    };
  }
  if (typeof copyToClipboard === 'undefined') {
    window.copyToClipboard = function (text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(function () { fallback(text); });
      } else { fallback(text); }
      function fallback(t) {
        var ta = document.createElement('textarea');
        ta.value = t; ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
      }
    };
  }
  if (typeof Modal === 'undefined') {
    window.Modal = {
      open:  function (id) { var el = document.getElementById(id); if (el) { el.style.display='flex'; el.classList.add('active'); } },
      close: function (id) { var el = document.getElementById(id); if (el) { el.style.display='none'; el.classList.remove('active'); } }
    };
  }
  if (typeof Storage === 'undefined' || typeof Storage.getSettings !== 'function') {
    window.Storage = {
      getSettings:  function () {
        try { var s = localStorage.getItem('doc_settings'); return s ? JSON.parse(s) : { orgName:'', approvalLevels:[{title:'담당',name:''},{title:'과장',name:''},{title:'관장',name:''}], receivers:[] }; }
        catch(e) { return { orgName:'', approvalLevels:[], receivers:[] }; }
      },
      saveSettings: function (s) { try { localStorage.setItem('doc_settings', JSON.stringify(s)); return true; } catch(e) { return false; } },
      getAllDrafts:  function () {
        try {
          var list = [];
          for (var i = 0; i < localStorage.length; i++) { var k = localStorage.key(i); if (k && k.indexOf('draft_')===0) { var item = JSON.parse(localStorage.getItem(k)); if (item) list.push(item); } }
          return list.sort(function(a,b){ return new Date(b.savedAt)-new Date(a.savedAt); });
        } catch(e) { return []; }
      },
      getDraft:    function (id) { try { return JSON.parse(localStorage.getItem('draft_'+id) || localStorage.getItem(id) || 'null'); } catch(e) { return null; } },
      saveDraft:   function (d)  { try { localStorage.setItem('draft_'+d.id, JSON.stringify(d)); return true; } catch(e) { return false; } },
      deleteDraft: function (id) { try { localStorage.removeItem('draft_'+id); localStorage.removeItem(id); return true; } catch(e) { return false; } },
      getAllDocs:   function () {
        try {
          var list=[], skip=['doc_settings','doc_logo','doc_org_detail','doc_cooperators'];
          for (var i=0; i<localStorage.length; i++) { var k=localStorage.key(i); if (k&&k.indexOf('doc_')===0&&skip.indexOf(k)===-1) { var item=JSON.parse(localStorage.getItem(k)); if(item) list.push(item); } }
          return list.sort(function(a,b){ return new Date(b.completedAt||b.savedAt)-new Date(a.completedAt||a.savedAt); });
        } catch(e) { return []; }
      },
      getDoc:    function (id) { try { return JSON.parse(localStorage.getItem('doc_'+id) || localStorage.getItem(id) || 'null'); } catch(e) { return null; } },
      saveDoc:   function (d)  { try { var k=d.id.indexOf('doc_')===0?d.id:'doc_'+d.id; localStorage.setItem(k,JSON.stringify(d)); return true; } catch(e) { return false; } },
      deleteDoc: function (id) { try { localStorage.removeItem('doc_'+id); localStorage.removeItem(id); return true; } catch(e) { return false; } }
    };
  }
  if (typeof ExtendedStorage === 'undefined') {
    window.ExtendedStorage = {
      getOrgDetail:  function () { try { return JSON.parse(localStorage.getItem('doc_org_detail')||'{}'); } catch(e) { return {}; } },
      saveOrgDetail: function (d) { try { localStorage.setItem('doc_org_detail',JSON.stringify(d)); return true; } catch(e) { return false; } }
    };
  }
  if (typeof LogoManager === 'undefined') {
    window.LogoManager = {
      get:    function () { try { return localStorage.getItem('doc_logo')||''; } catch(e) { return ''; } },
      save:   function (d) { try { localStorage.setItem('doc_logo',d); return true; } catch(e) { return false; } },
      remove: function () { try { localStorage.removeItem('doc_logo'); return true; } catch(e) { return false; } }
    };
  }
})();
</script>

<script src="js/preview.js"></script>

</body>
</html>
