<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 미리보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #111;
    }

    /* ── 상단 툴바 ───────────────────────────────────── */
    .preview-toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }
    .preview-toolbar .toolbar-left  { display: flex; align-items: center; gap: 8px; flex: 1; }
    .preview-toolbar .toolbar-right { display: flex; align-items: center; gap: 8px; }

    .toolbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #222;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-draft     { background: #fff3cd; color: #856404; }
    .badge-completed { background: #d1e7dd; color: #0f5132; }

    /* ── 버튼 공통 ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled     { opacity: .45; cursor: not-allowed; }
    .btn-back         { background: #e9ecef; color: #333; }
    .btn-edit         { background: #e9ecef; color: #333; }
    .btn-copy         { background: #e9ecef; color: #333; }
    .btn-print        { background: #0d6efd; color: #fff; }
    .btn-complete     { background: #198754; color: #fff; }
    .btn-delete       { background: #dc3545; color: #fff; }

    .btn-back:hover     { background: #dee2e6; }
    .btn-edit:hover     { background: #dee2e6; }
    .btn-copy:hover     { background: #dee2e6; }
    .btn-print:hover    { background: #0b5ed7; }
    .btn-complete:hover { background: #157347; }
    .btn-delete:hover   { background: #bb2d3b; }

    /* ── 페이지 래퍼 ─────────────────────────────────── */
    .preview-wrapper {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 16px 60px;
    }

    /* ── A4 용지 ─────────────────────────────────────── */
    .doc-paper {
      background: #fff;
      padding: 40mm 30mm 30mm 30mm;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      border-radius: 4px;
      min-height: 297mm;
      display: flex;
      flex-direction: column;
    }

    #doc-preview {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100%;
    }

    .doc-paper-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100%;
    }

    .doc-main-area { flex: 1; }

    /* ━━━ 기관정보 블록: 항상 하단 고정 ━━━ */
    .doc-org-footer {
      margin-top: auto;
      padding-top: 8px;
    }

    /* ① 기관명 */
    .doc-header-area {
      text-align: center;
      padding-bottom: 20px;
    }
    .doc-org-name {
      font-size: 22pt;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #111;
    }

    /* ② 수신·경유·참조
       ★ 레이블 너비를 고정하여 콜론(:) 위치 정렬 ★     */
    .doc-meta-area { margin-bottom: 10px; }
    .doc-meta-row {
      display: flex;
      align-items: baseline;
      font-size: 11pt;
      line-height: 1.7;
      margin-bottom: 2px;
    }
    .doc-meta-label {
      display: inline-block;
      width: 4.5em;          /* ★ 고정 너비로 콜론 정렬 ★ */
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .doc-meta-colon {
      margin: 0 8px 0 0;     /* ★ 콜론 뒤 공백 8px ★ */
      flex-shrink: 0;
    }
    .doc-meta-value { flex: 1; }

    /* ③ 제목
       ★ 레이블 너비 meta-label 과 동일하게 맞춤 ★      */
    .doc-title-area {
      display: flex;
      align-items: baseline;
      font-size: 12pt;
      font-weight: 700;
      padding-bottom: 8px;
      line-height: 1.7;
    }
    .doc-title-label {
      display: inline-block;
      width: 4.5em;          /* ★ meta-label 과 동일 ★ */
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }
    .doc-title-colon {
      margin: 0 8px 0 0;
      flex-shrink: 0;
    }
    .doc-title-text { flex: 1; }

    /* ★★★ 구분선 1: 제목 바로 아래 ★★★ */
    .doc-title-divider {
      border: none;
      border-top: 1.5px solid #111;
      margin: 0 0 20px 0;
    }

    /* ══════════════════════════════════════════
       ④ 본문 – 공문서 항목 스타일
    ══════════════════════════════════════════ */
    .doc-body-area {
      font-size: 11pt;
      line-height: 1.8;
      margin-bottom: 8px;
    }

    /* 일반 줄 */
    .body-line {
      display: block;
      line-height: 1.8;
      margin-bottom: 1px;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    /* 빈 줄 간격 */
    .body-blank { height: 0.5em; }

    /* 항목 줄: 기호 + 내용 가로 정렬
       ★ padding-left 로 단계별 들여쓰기 ★             */
    .body-item {
      display: flex;
      align-items: flex-start;
      line-height: 1.8;
      margin-bottom: 1px;
      word-break: keep-all;
    }
    .body-item-symbol {
      flex-shrink: 0;
      font-weight: 600;
      white-space: nowrap;
    }
    .body-item-content {
      flex: 1;
      white-space: pre-wrap;
      word-break: keep-all;
    }

    .body-empty { color: #aaa; }

    /* 끝. 표시 (붙임 없을 때) */
    .body-end-mark {
      display: block;
      font-size: 11pt;
      margin-top: 2px;
      margin-bottom: 12px;
    }

    /* ══════════════════════════════════════════
       ⑤ 붙임
       ★ 레이블과 내용 사이 간격 최소화 ★
    ══════════════════════════════════════════ */
    .doc-attach-area {
      display: flex;
      align-items: flex-start;
      font-size: 11pt;
      margin-bottom: 12px;
    }
    .doc-attach-label {
      flex-shrink: 0;
      font-weight: 600;
      white-space: nowrap;
      /* ★ 레이블 너비: meta-label 과 동일 ★ */
      width: 4.5em;
      letter-spacing: 0.05em;
    }
    /* ★ 레이블과 내용 사이 1자(1em) 공백 ★ */
    .doc-attach-gap {
      flex-shrink: 0;
      width: 1em;
    }
    .doc-attach-body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    /* 붙임 1개 */
    .doc-attach-item {
      display: block;
      line-height: 1.8;
    }
    /* 붙임 2개 이상 */
    .doc-attach-item-row {
      display: flex;
      align-items: flex-start;
      line-height: 1.8;
    }
    .doc-attach-num {
      flex-shrink: 0;
      font-weight: 600;
      min-width: 1.8em;
    }
    .doc-attach-item-text { flex: 1; }

    /* ⑥ 발신명의 */
    .doc-sender-area {
      text-align: center;
      font-size: 13pt;
      font-weight: 700;
      padding-bottom: 12px;
    }

    /* ★★★ 구분선 2: 발신명의 바로 아래 ★★★ */
    .doc-sender-divider {
      border: none;
      border-top: 1.5px solid #111;
      margin: 0 0 8px 0;
    }

    /* ⑦ 결재란: 왼쪽 정렬, 테두리 없음 */
    .doc-approval-wrap { margin-bottom: 0; }
    .doc-approval-row {
      display: flex;
      flex-direction: row;
      justify-content: flex-start;
      align-items: center;
      gap: 24px;
      margin-bottom: 0;
      line-height: 1.4;
    }
    .doc-approval-cell {
      display: flex;
      flex-direction: row;
      align-items: center;
      font-size: 10pt;
    }
    .doc-approval-title { font-weight: 600; white-space: nowrap; }
    .doc-approval-sign {
      display: inline-block;
      width: 60px;
      height: 1.4em;
      vertical-align: middle;
    }
    .doc-approval-name { display: none; }

    /* 협조자 */
    .doc-cooperator-row {
      display: flex;
      align-items: baseline;
      font-size: 10pt;
      line-height: 1.4;
      margin-top: 2px;
      margin-bottom: 4px;
    }
    .doc-cooperator-label { width: 5em; font-weight: 600; white-space: nowrap; }
    .doc-cooperator-value { flex: 1; }

    /* ⑧ 시행·접수 행 */
    .doc-exec-row {
      display: flex;
      align-items: baseline;
      font-size: 10pt;
      line-height: 1.4;
      margin-bottom: 4px;
      gap: 4px;
    }
    .doc-exec-label  { font-weight: 600; white-space: nowrap; }
    .doc-exec-value  { flex: 1; }
    .doc-exec-spacer { flex: 1; }
    .doc-exec-recv   { white-space: nowrap; font-size: 10pt; }
    .doc-exec-recv-space {
      display: inline-block;
      width: 6.5em;
      height: 1.2em;
      vertical-align: baseline;
    }

    /* ⑨ 주소·연락처 */
    .doc-footer-wrap    { margin-top: 4px; }
    .doc-footer-addr    { font-size: 9pt; color: #333; margin-bottom: 2px; }
    .doc-footer-contact { font-size: 9pt; color: #333; }

    /* ── 인쇄 설정 ───────────────────────────────────── */
    @media print {
      body { background: #fff; }
      .preview-toolbar { display: none; }
      .preview-wrapper { margin: 0; padding: 0; max-width: 100%; }

      .doc-paper {
        box-shadow: none;
        border-radius: 0;
        padding: 15mm 20mm 10mm 20mm;
        min-height: 277mm;
        display: flex;
        flex-direction: column;
      }

      #doc-preview {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .doc-paper-inner {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .doc-main-area { flex: 1; }

      .doc-org-footer {
        margin-top: auto;
        padding-top: 8px;
        page-break-inside: avoid;
      }
    }

    /* ── 반응형 ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .preview-toolbar { padding: 8px 12px; flex-wrap: wrap; }
      .doc-paper { padding: 24px 16px; }
      .btn { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>

<body>

  <!-- 툴바 -->
  <div class="preview-toolbar">
    <div class="toolbar-left">
      <button class="btn btn-back" id="btn-back">← 뒤로</button>
      <span class="toolbar-title">문서 미리보기</span>
      <span class="badge badge-draft" id="status-badge">임시저장</span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-edit"     id="btn-edit">✏️ 편집</button>
      <button class="btn btn-copy"     id="btn-copy">📋 복사</button>
      <button class="btn btn-print"    id="btn-print">🖨️ 인쇄</button>
      <button class="btn btn-complete" id="btn-complete">✅ 완성저장</button>
      <button class="btn btn-delete"   id="btn-delete">🗑️ 삭제</button>
    </div>
  </div>

  <!-- 미리보기 영역 -->
  <div class="preview-wrapper">
    <div class="doc-paper">
      <div id="doc-preview">
        <p style="color:#aaa; text-align:center; padding:60px 0;">문서를 불러오는 중...</p>
      </div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/preview.js"></script>

</body>
</html>
