<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미리보기 - 공문서 작성 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header no-print">
    <div class="header-inner">
      <a href="index.html" class="logo">🏛️ 공문서 작성 도우미</a>
      <nav class="nav">
        <a href="index.html" class="nav-link">🏠 홈</a>
        <a href="editor.html" class="nav-link">✍️ 새 문서</a>
        <a href="settings.html" class="nav-link">⚙️ 기관설정</a>
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="preview-wrap">

      <!-- 도구 모음 -->
      <div class="preview-toolbar no-print">
        <div class="toolbar-left">
          <button id="back-btn" class="btn btn-secondary btn-sm">← 목록</button>
          <h2 id="preview-title" class="preview-doc-title">미리보기</h2>
          <span id="doc-status"></span>
        </div>
        <div class="toolbar-right">
          <button id="edit-btn"     class="btn btn-secondary btn-sm">✏️ 수정</button>
          <button id="copy-btn"     class="btn btn-secondary btn-sm">📋 복사</button>
          <button id="print-btn"    class="btn btn-secondary btn-sm">🖨️ 인쇄 <kbd>Ctrl+P</kbd></button>
          <button id="complete-btn" class="btn btn-primary    btn-sm">✅ 완성 저장</button>
          <button id="delete-btn"   class="btn btn-danger     btn-sm">🗑️ 삭제</button>
        </div>
      </div>

      <!-- 문서 미리보기 영역 -->
      <div id="doc-preview" class="doc-preview-area">
        <p style="text-align:center;color:#888;padding:60px;">문서를 불러오는 중…</p>
      </div>

      <!-- 하단 버튼 -->
      <div class="preview-bottom-actions no-print">
        <button id="edit-btn-bottom"     class="btn btn-secondary">✏️ 수정</button>
        <button id="copy-btn-bottom"     class="btn btn-secondary">📋 복사</button>
        <button id="print-btn-bottom"    class="btn btn-secondary">🖨️ 인쇄</button>
        <button id="complete-btn-bottom" class="btn btn-primary"  >✅ 완성 저장</button>
      </div>

    </div>
  </main>

  <!-- ── 복사 완료 모달 ── -->
  <div class="modal-overlay" id="copy-modal" style="display:none;">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-header">
        <h3>📋 복사 완료</h3>
        <button class="modal-close-btn modal-cancel-btn">✕</button>
      </div>
      <div class="modal-body">
        <p>문서 내용이 클립보드에 복사되었습니다.<br>
           한글(HWP) 또는 다른 편집기에 붙여넣기 하세요.</p>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel-btn btn btn-primary">확인</button>
      </div>
    </div>
  </div>

  <!-- ── 완성 저장 확인 모달 ── -->
  <div class="modal-overlay" id="complete-confirm-modal" style="display:none;">
    <div class="modal-box" style="max-width:420px;">
      <div class="modal-header">
        <h3>✅ 완성 문서로 저장</h3>
        <button class="modal-close-btn modal-cancel-btn">✕</button>
      </div>
      <div class="modal-body">
        <p>이 문서를 <strong>완성 문서</strong>로 저장하시겠습니까?</p>
        <p style="color:#666;font-size:0.88rem;margin-top:8px;">
          완성 저장된 문서는 홈 화면의 "완성 문서" 목록에 보관됩니다.
        </p>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel-btn btn btn-secondary">취소</button>
        <button id="confirm-complete-btn" class="btn btn-primary">저장하기</button>
      </div>
    </div>
  </div>

  <!-- ── 삭제 확인 모달 ── -->
  <div class="modal-overlay" id="delete-confirm-modal" style="display:none;">
    <div class="modal-box" style="max-width:400px;">
      <div class="modal-header">
        <h3>🗑️ 문서 삭제</h3>
        <button class="modal-close-btn modal-cancel-btn">✕</button>
      </div>
      <div class="modal-body">
        <p>이 문서를 삭제하시겠습니까?</p>
        <p style="color:#e74c3c;font-size:0.88rem;margin-top:8px;">
          ⚠️ 삭제된 문서는 복구할 수 없습니다.
        </p>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel-btn btn btn-secondary">취소</button>
        <button id="confirm-delete-btn" class="btn btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/preview.js"></script>

  <style>
    /* ════════════════════════════════════════════
       미리보기 레이아웃
    ════════════════════════════════════════════ */
    .preview-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar-left,
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preview-doc-title {
      font-size: 1rem;
      font-weight: 700;
      color: #2c3e50;
      margin: 0;
    }
    .preview-bottom-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding: 16px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
    }

    /* ════════════════════════════════════════════
       문서 용지 전체
    ════════════════════════════════════════════ */
    .doc-preview-area {
      background: #f5f5f5;
      padding: 30px 20px;
      border-radius: 4px;
    }
    .doc-paper {
      background: #fff;
      padding: 50px 60px;
      max-width: 740px;
      margin: 0 auto;
      font-family: 'Noto Sans KR', '맑은 고딕', serif;
      font-size: 10.5pt;
      line-height: 1.9;
      color: #000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    /* ════════════════════════════════════════════
       문서 헤더 (로고 + 기관명 + 구분선)
    ════════════════════════════════════════════ */
    .doc-header {
      margin-bottom: 24px;
    }
    .doc-logo-area {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .doc-logo {
      max-height: 64px;
      max-width: 220px;
      object-fit: contain;
    }
    .doc-org-name {
      font-size: 15pt;
      font-weight: 700;
      text-align: center;
      letter-spacing: 6px;
      margin-bottom: 10px;
      color: #000;
    }
    .doc-header-line {
      border-top: 2.5px solid #000;
      border-bottom: 1px solid #000;
      height: 5px;
      margin-bottom: 0;
    }

    /* ════════════════════════════════════════════
       내부결재 표시
    ════════════════════════════════════════════ */
    .doc-type-label {
      text-align: center;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 10px;
      padding: 14px 0;
      border-bottom: 1px solid #bbb;
      margin-bottom: 20px;
    }

    /* ════════════════════════════════════════════
       수신 / 경유 필드 행
    ════════════════════════════════════════════ */
    .doc-fields {
      margin-bottom: 20px;
    }
    .doc-field-row {
      display: flex;
      gap: 0;
      margin-bottom: 2px;
      font-size: 10pt;
    }
    .doc-label {
      min-width: 52px;
      font-weight: 600;
      color: #000;
    }
    .doc-label::after {
      content: ':';
      margin-right: 6px;
    }
    .doc-value {
      flex: 1;
      color: #000;
    }

    /* ════════════════════════════════════════════
       제목
    ════════════════════════════════════════════ */
    .doc-title {
      font-size: 12pt;
      font-weight: 700;
      text-decoration: underline;
      text-align: center;
      margin: 20px 0 24px;
      letter-spacing: 1px;
      color: #000;
    }

    /* ════════════════════════════════════════════
       본문
    ════════════════════════════════════════════ */
    .doc-body {
      margin-bottom: 20px;
      font-size: 10.5pt;
    }
    .doc-body-line {
      margin: 0 0 8px;
      text-indent: 0;
    }
    .doc-event-box {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 14px 20px;
      margin: 12px 0 12px 20px;
      background: #fafafa;
      font-size: 10pt;
    }
    .doc-event-box p {
      margin: 4px 0;
    }

    /* ════════════════════════════════════════════
       붙임
    ════════════════════════════════════════════ */
    .doc-attachments {
      margin: 16px 0 8px;
      font-size: 10pt;
    }
    .doc-attach-label {
      font-weight: 600;
      margin-right: 8px;
    }

    /* ════════════════════════════════════════════
       끝.
    ════════════════════════════════════════════ */
    .doc-end {
      text-align: right;
      font-weight: 700;
      font-size: 10.5pt;
      margin: 16px 0 24px;
      padding-right: 4px;
    }

    /* ════════════════════════════════════════════
       발신명의 + 결재란 영역
    ════════════════════════════════════════════ */
    .doc-footer-area {
      margin-top: 30px;
      border-top: 1px solid #ccc;
      padding-top: 20px;
    }
    .doc-sender {
      text-align: center;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }

    /* ════════════════════════════════════════════
       결재란 테이블
    ════════════════════════════════════════════ */
    .doc-approval-wrap {
      display: flex;
      justify-content: flex-end;
      gap: 0;
      margin-bottom: 20px;
    }
    .doc-approval-table {
      border-collapse: collapse;
      font-size: 9pt;
      text-align: center;
    }
    .doc-approval-table th {
      background: #f0f4f8;
      border: 1px solid #999;
      padding: 5px 14px;
      font-weight: 700;
      font-size: 9pt;
    }
    .doc-approval-table td {
      border: 1px solid #999;
      padding: 0;
      min-width: 64px;
      height: 56px;
      vertical-align: middle;
    }
    .approval-title-cell {
      padding: 6px 10px;
      font-size: 8.5pt;
      border-right: 1px solid #999;
      white-space: pre-line;
    }
    .approval-sign-cell {
      padding: 6px 10px;
      min-width: 64px;
      height: 56px;
      font-size: 9pt;
    }
    .doc-coop-table {
      margin-right: 0;
      border-right: none;
    }
    .doc-coop-table td,
    .doc-coop-table th {
      border-right: none;
    }

    /* ════════════════════════════════════════════
       문서 하단 정보 (시행번호, 주소, 연락처)
    ════════════════════════════════════════════ */
    .doc-info-area {
      margin-top: 16px;
      border-top: 1.5px solid #000;
      padding-top: 8px;
      font-size: 8.5pt;
      color: #333;
    }
    .doc-info-line {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 4px;
    }
    .doc-info-line span {
      white-space: nowrap;
    }

    /* ════════════════════════════════════════════
       모달
    ════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3   { font-size: 1.05rem; font-weight: 700; margin: 0; }
    .modal-close-btn   { background: none; border: none; font-size: 1.1rem; cursor: pointer; }
    .modal-body        { font-size: 0.92rem; line-height: 1.7; }
    .modal-footer      { display: flex; justify-content: flex-end; gap: 10px; }

    /* ════════════════════════════════════════════
       공통 버튼
    ════════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, transform .1s;
      text-decoration: none;
      font-family: inherit;
    }
    .btn:active        { transform: scale(.97); }
    .btn-primary       { background: #3498db; color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-secondary       { background: #ecf0f1; color: #2c3e50; }
    .btn-secondary:hover { background: #dde4e6; }
    .btn-danger       { background: #e74c3c; color: #fff; }
    .btn-danger:hover { background: #c0392b; }
    .btn-sm { padding: 5px 11px; font-size: 0.82rem; }
    .badge  {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-success { background: #e8f8f0; color: #27ae60; }
    .badge-warning { background: #fef9e7; color: #f39c12; }
    kbd {
      font-size: 0.74rem;
      background: #eee;
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
    }

    /* ════════════════════════════════════════════
       인쇄 전용 스타일
    ════════════════════════════════════════════ */
    @media print {
      .no-print,
      .preview-toolbar,
      .preview-bottom-actions,
      header, nav  { display: none !important; }

      body         { background: #fff; margin: 0; }
      .main-content{ padding: 0; }
      .preview-wrap{ padding: 0; max-width: 100%; }
      .doc-preview-area {
        background: #fff;
        padding: 0;
        box-shadow: none;
        border: none;
      }
      .doc-paper   {
        padding: 15mm 20mm;
        box-shadow: none;
        max-width: 100%;
        font-size: 10pt;
      }
      .modal-overlay { display: none !important; }

      /* 인쇄 시 색상 강제 적용 */
      .doc-approval-table th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .doc-event-box         { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* ════════════════════════════════════════════
       반응형
    ════════════════════════════════════════════ */
    @media (max-width: 768px) {
      .preview-toolbar   { flex-direction: column; align-items: flex-start; }
      .toolbar-right     { flex-wrap: wrap; }
      .doc-paper         { padding: 24px 16px; font-size: 9.5pt; }
      .doc-org-name      { font-size: 13pt; letter-spacing: 3px; }
      .doc-approval-wrap { justify-content: center; }
      .preview-bottom-actions { flex-direction: column; align-items: center; }
    }

    @media (max-width: 480px) {
      .doc-paper    { padding: 16px 10px; }
      .doc-title    { font-size: 11pt; }
      .doc-sender   { font-size: 11pt; }
      .doc-approval-table th,
      .doc-approval-table td { min-width: 48px; padding: 4px; }
    }
  </style>
</body>
</html>
