<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미리보기 - 공문서 작성 도우미</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <a href="index.html" class="header-logo">
          <span>🏛️</span>
          공문서 작성 도우미
        </a>
        <nav class="header-nav">
          <a href="index.html">🏠 홈</a>
          <a href="editor.html">✍️ 새 문서</a>
          <a href="settings.html">⚙️ 기관설정</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- 메인 -->
  <main class="main-content">
    <div class="container">
      <div class="preview-page">

        <!-- 툴바 -->
        <div class="preview-toolbar">

          <!-- 왼쪽: 뒤로 + 제목 + 상태 -->
          <div style="display:flex;align-items:center;
            gap:12px;flex-wrap:wrap">
            <button class="btn btn-outline"
              id="back-btn">
              ← 뒤로
            </button>
            <div>
              <div style="font-size:16px;font-weight:700;
                color:var(--gray-800)"
                id="preview-title">
                문서 미리보기
              </div>
              <div style="margin-top:2px"
                id="doc-status">
              </div>
            </div>
          </div>

          <!-- 오른쪽: 버튼들 -->
          <div class="btn-group">
            <button class="btn btn-outline"
              id="edit-btn"
              title="문서 수정하기">
              ✏️ 수정
            </button>
            <button class="btn btn-outline"
              id="copy-btn"
              title="텍스트 복사 (HWP 붙여넣기용)">
              📋 복사
            </button>
            <button class="btn btn-outline"
              id="print-btn"
              title="인쇄 (Ctrl+P)">
              🖨️ 인쇄
            </button>
            <button class="btn btn-success"
              id="complete-btn"
              title="완성 문서로 저장">
              ✅ 완성 저장
            </button>
            <button class="btn btn-danger"
              id="delete-btn"
              title="문서 삭제">
              🗑️ 삭제
            </button>
          </div>

        </div>

        <!-- 인쇄 안내 -->
        <div style="background:var(--accent);
          border:1px solid var(--secondary);
          border-radius:var(--border-radius);
          padding:10px 16px;
          font-size:12px;
          color:var(--primary);
          margin-bottom:16px;
          display:flex;
          align-items:center;
          gap:8px">
          <span>💡</span>
          <span>
            <strong>HWP로 옮기려면</strong>
            복사 버튼을 눌러 텍스트를 복사한 후
            HWP에 붙여넣기 해주세요
          </span>
        </div>

        <!-- 공문서 미리보기 -->
        <div class="doc-preview" id="doc-preview">
          <div style="text-align:center;
            padding:40px;color:var(--gray-400)">
            <div style="font-size:40px;
              margin-bottom:12px">📄</div>
            <p>문서를 불러오는 중이에요...</p>
          </div>
        </div>

        <!-- 하단 버튼 -->
        <div style="display:flex;
          justify-content:center;
          gap:12px;
          margin-top:20px;
          margin-bottom:40px;
          flex-wrap:wrap">
          <button class="btn btn-outline btn-lg"
            onclick="window.location.href='index.html'">
            🏠 홈으로
          </button>
          <button class="btn btn-outline btn-lg"
            id="edit-btn-bottom">
            ✏️ 수정하기
          </button>
          <button class="btn btn-outline btn-lg"
            id="copy-btn-bottom">
            📋 텍스트 복사
          </button>
          <button class="btn btn-primary btn-lg"
            id="print-btn-bottom">
            🖨️ 인쇄하기
          </button>
          <button class="btn btn-success btn-lg"
            id="complete-btn-bottom">
            ✅ 완성 저장
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- =====================
       모달들
       ===================== -->

  <!-- 복사 모달 -->
  <div class="modal-overlay" id="copy-modal">
    <div class="modal" style="max-width:700px">
      <div class="modal-header">
        <div class="modal-title">
          📋 텍스트 복사
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="background:var(--accent);
          border-radius:var(--border-radius);
          padding:12px;
          font-size:13px;
          color:var(--primary);
          margin-bottom:12px">
          💡 아래 텍스트를 복사해서
          한글(HWP)에 붙여넣기 하세요
        </div>
        <textarea
          id="copy-content"
          class="form-control"
          style="height:400px;
            font-family:'맑은 고딕',sans-serif;
            font-size:13px;
            line-height:2"
          readonly
        ></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary"
          id="copy-modal-btn">
          📋 전체 복사
        </button>
        <button class="btn btn-outline modal-close">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- 완성 저장 확인 모달 -->
  <div class="modal-overlay" id="complete-confirm-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <div class="modal-title">
          ✅ 완성 문서 저장
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center;padding:16px 0">
          <div style="font-size:48px;margin-bottom:16px">
            ✅
          </div>
          <p style="font-size:15px;font-weight:600;
            margin-bottom:8px">
            완성 문서로 저장할까요?
          </p>
          <p style="font-size:13px;color:var(--gray-500)">
            임시저장에서 완성 문서 목록으로
            이동해요
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-success"
          id="confirm-complete-btn">
          ✅ 완성 저장
        </button>
        <button class="btn btn-outline modal-close">
          취소
        </button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="delete-confirm-modal">
    <div class="modal" style="max-width:400px">
      <div class="modal-header">
        <div class="modal-title">
          🗑️ 문서 삭제
        </div>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div style="text-align:center;padding:16px 0">
          <div style="font-size:48px;margin-bottom:16px">
            🗑️
          </div>
          <p style="font-size:15px;font-weight:600;
            margin-bottom:8px">
            이 문서를 삭제할까요?
          </p>
          <p style="font-size:13px;color:var(--danger)">
            ⚠️ 삭제된 문서는 복구할 수 없어요
          </p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-danger"
          id="confirm-delete-btn">
          🗑️ 삭제
        </button>
        <button class="btn btn-outline modal-close">
          취소
        </button>
      </div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/preview.js"></script>

  <!-- 추가 이벤트 바인딩 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // 하단 버튼 바인딩
      const editBtnBottom = document.getElementById(
        'edit-btn-bottom'
      );
      if (editBtnBottom) {
        editBtnBottom.addEventListener(
          'click', goToEdit
        );
      }

      const copyBtnBottom = document.getElementById(
        'copy-btn-bottom'
      );
      if (copyBtnBottom) {
        copyBtnBottom.addEventListener(
          'click', openCopyModal
        );
      }

      const printBtnBottom = document.getElementById(
        'print-btn-bottom'
      );
      if (printBtnBottom) {
        printBtnBottom.addEventListener(
          'click', printDocument
        );
      }

      const completeBtnBottom = document.getElementById(
        'complete-btn-bottom'
      );
      if (completeBtnBottom) {
        completeBtnBottom.addEventListener('click', () => {
          Modal.open('complete-confirm-modal');
        });
      }

      // 완성 저장 버튼 (툴바)
      const completeBtn = document.getElementById(
        'complete-btn'
      );
      if (completeBtn) {
        completeBtn.removeEventListener(
          'click', saveAsComplete
        );
        completeBtn.addEventListener('click', () => {
          Modal.open('complete-confirm-modal');
        });
      }

      // 완성 저장 확인 버튼
      const confirmCompleteBtn = document.getElementById(
        'confirm-complete-btn'
      );
      if (confirmCompleteBtn) {
        confirmCompleteBtn.addEventListener('click', () => {
          Modal.close('complete-confirm-modal');
          saveAsComplete();
        });
      }

      // 삭제 버튼 (툴바)
      const deleteBtn = document.getElementById(
        'delete-btn'
      );
      if (deleteBtn) {
        deleteBtn.removeEventListener(
          'click', deleteCurrentDoc
        );
        deleteBtn.addEventListener('click', () => {
          Modal.open('delete-confirm-modal');
        });
      }

      // 삭제 확인 버튼
      const confirmDeleteBtn = document.getElementById(
        'confirm-delete-btn'
      );
      if (confirmDeleteBtn) {
        confirmDeleteBtn.addEventListener('click', () => {
          Modal.close('delete-confirm-modal');
          deleteCurrentDoc();
        });
      }

      // 모달 닫기
      document.querySelectorAll('.modal-close')
        .forEach(btn => {
          btn.addEventListener('click', () => {
            Modal.closeAll();
          });
        });

    });
  </script>

  <!-- 인쇄 전용 스타일 -->
  <style>
    @media print {
      /* 인쇄시 불필요한 요소 숨김 */
      .header,
      .preview-toolbar,
      .preview-page > div:not(.doc-preview),
      footer,
      .modal-overlay {
        display: none !important;
      }

      /* 공문서만 전체 화면으로 */
      .main-content {
        padding: 0 !important;
      }

      .container {
        max-width: 100% !important;
        padding: 0 !important;
      }

      .preview-page {
        max-width: 100% !important;
      }

      .doc-preview {
        box-shadow: none !important;
        border-radius: 0 !important;
        padding: 20mm 25mm !important;
        min-height: 100vh;
      }

      body {
        background: white !important;
      }

      /* 결재란 인쇄 */
      .approval-table {
        page-break-inside: avoid;
      }
    }

    /* 미리보기 반응형 */
    @media (max-width: 768px) {
      .preview-toolbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-group {
        flex-wrap: wrap;
      }

      .doc-preview {
        padding: 20px;
      }
    }

    /* 완성 저장 버튼 강조 (임시저장 상태일때) */
    .doc-status-draft #complete-btn {
      animation: pulse 2s infinite;
    }

    /* 문서 미리보기 확대 효과 */
    .doc-preview {
      transition: box-shadow 0.2s;
    }

    .doc-preview:hover {
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }
  </style>

</body>
</html>
