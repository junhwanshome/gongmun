<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 미리보기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #111;
    }

    /* ── 상단 툴바 ───────────────────────────────────── */
    .preview-toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
    }
    .preview-toolbar .toolbar-left  { display: flex; align-items: center; gap: 8px; flex: 1; }
    .preview-toolbar .toolbar-right { display: flex; align-items: center; gap: 8px; }

    .toolbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #222;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-draft     { background: #fff3cd; color: #856404; }
    .badge-completed { background: #d1e7dd; color: #0f5132; }

    /* 버튼 공통 */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 7px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled     { opacity: .45; cursor: not-allowed; }
    .btn-back         { background: #e9ecef; color: #333; }
    .btn-edit         { background: #e9ecef; color: #333; }
    .btn-copy         { background: #e9ecef; color: #333; }
    .btn-print        { background: #0d6efd; color: #fff; }
    .btn-complete     { background: #198754; color: #fff; }
    .btn-delete       { background: #dc3545; color: #fff; }

    .btn-back:hover     { background: #dee2e6; }
    .btn-edit:hover     { background: #dee2e6; }
    .btn-copy:hover     { background: #dee2e6; }
    .btn-print:hover    { background: #0b5ed7; }
    .btn-complete:hover { background: #157347; }
    .btn-delete:hover   { background: #bb2d3b; }

    /* ── 페이지 래퍼 ─────────────────────────────────── */
    .preview-wrapper {
      max-width: 860px;
      margin: 36px auto;
      padding: 0 16px 60px;
    }

    /* ── A4 용지 ─────────────────────────────────────── */
    .doc-paper {
      background: #fff;
      padding: 40mm 30mm 30mm 30mm;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      border-radius: 4px;
      min-height: 297mm;
      /* 내부를 flex column으로 구성해 기관정보 하단 고정 */
      display: flex;
      flex-direction: column;
    }

    /* ── doc-preview 내부 래퍼 ───────────────────────── */
    /* doc-paper 안의 #doc-preview가 flex column 역할 */
    #doc-preview {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100%;
    }

    /* ── doc-paper-inner: 본문↑ 기관정보↓ ───────────── */
    .doc-paper-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 100%;
    }

    /* 본문 영역: 남은 공간을 모두 차지 */
    .doc-main-area {
      flex: 1;
    }

    /* ━━━ 기관정보 블록: 항상 하단 고정 ━━━
       - 화면: margin-top: auto 로 하단 밀착
       - 인쇄: position fixed 대신 page 하단에 붙도록
         @page margin + margin-top:auto 조합 사용       */
    .doc-org-footer {
      margin-top: auto;
      padding-top: 12px;
    }

    /* ① 기관명 – 구분선 없음 */
    .doc-header-area {
      text-align: center;
      padding-bottom: 20px;
    }
    .doc-org-name {
      font-size: 22pt;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #111;
    }

    /* ② 수신·경유·참조 */
    .doc-meta-area { margin-bottom: 10px; }
    .doc-meta-row {
      display: flex;
      align-items: baseline;
      font-size: 11pt;
      line-height: 1.6;
      margin-bottom: 4px;
    }
    .doc-meta-label { width: 5em; font-weight: 600; white-space: nowrap; }
    .doc-meta-colon { margin: 0 6px; }
    .doc-meta-value { flex: 1; }

    /* ③ 제목 */
    .doc-title-area {
      display: flex;
      align-items: baseline;
      font-size: 12pt;
      font-weight: 700;
      padding-bottom: 8px;
    }
    .doc-title-label { width: 5em; white-space: nowrap; }
    .doc-title-colon { margin: 0 6px; }
    .doc-title-text  { flex: 1; }

    /* ★★★ 구분선 1: 제목 바로 아래 ★★★ */
    .doc-title-divider {
      border: none;
      border-top: 1.5px solid #111;
      margin: 0 0 20px 0;
    }

    /* ④ 본문 */
    .doc-body-area {
      font-size: 11pt;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    /* ⑤ 붙임 */
    .doc-attach-area {
      display: flex;
      align-items: baseline;
      font-size: 11pt;
      margin-bottom: 20px;
    }
    .doc-attach-label { width: 5em; font-weight: 600; white-space: nowrap; }
    .doc-attach-colon { margin: 0 6px; }
    .doc-attach-value { flex: 1; }

    /* ⑥ 발신명의 */
    .doc-sender-area {
      text-align: center;
      font-size: 13pt;
      font-weight: 700;
      padding-bottom: 12px;
    }

    /* ★★★ 구분선 2: 발신명의 바로 아래 ★★★ */
    .doc-sender-divider {
      border: none;
      border-top: 1.5px solid #111;
      margin: 0 0 10px 0;
    }

    /* ⑦ 결재란 – 한 줄 가로 나열, 테두리 없음 */
    .doc-approval-wrap { margin-bottom: 6px; }
    .doc-approval-row {
      display: flex;
      flex-direction: row;
      justify-content: flex-end;
      align-items: flex-start;
      gap: 40px;
      margin-bottom: 6px;
    }
    .doc-approval-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10pt;
      min-width: 60px;
    }
    .doc-approval-title { font-weight: 600; margin-bottom: 4px; }
    .doc-approval-sign  { height: 36px; width: 100%; }
    .doc-approval-name  { margin-top: 2px; }

    /* 협조자 행 */
    .doc-cooperator-row {
      display: flex;
      align-items: baseline;
      font-size: 10pt;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .doc-cooperator-label { width: 5em; font-weight: 600; white-space: nowrap; }
    .doc-cooperator-value { flex: 1; }

    /* ⑧ 시행·접수 행 */
    .doc-exec-row {
      display: flex;
      align-items: baseline;
      font-size: 10pt;
      line-height: 1.5;
      margin-bottom: 6px;
      gap: 6px;
    }
    .doc-exec-label  { font-weight: 600; white-space: nowrap; }
    .doc-exec-value  { flex: 1; }
    .doc-exec-spacer { flex: 1; }
    .doc-exec-recv   { white-space: nowrap; }

    /* ⑨ 주소·연락처 – hr 없음 */
    .doc-footer-wrap { margin-top: 4px; }
    .doc-footer-addr    { font-size: 9pt; color: #333; margin-bottom: 2px; }
    .doc-footer-contact { font-size: 9pt; color: #333; }

    /* ── 인쇄 설정 ───────────────────────────────────── */
    @media print {
      body { background: #fff; }
      .preview-toolbar { display: none; }
      .preview-wrapper { margin: 0; padding: 0; max-width: 100%; }

      .doc-paper {
        box-shadow: none;
        border-radius: 0;
        padding: 15mm 20mm 10mm 20mm;
        min-height: 277mm; /* 297mm - 상하여백 20mm */
        display: flex;
        flex-direction: column;
      }

      #doc-preview {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .doc-paper-inner {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .doc-main-area { flex: 1; }

      /* 인쇄 시 기관정보 하단 고정 */
      .doc-org-footer {
        margin-top: auto;
        padding-top: 12px;
      }

      /* 기관정보 블록이 페이지 넘어가지 않도록 */
      .doc-org-footer { page-break-inside: avoid; }
    }

    /* ── 반응형 ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .preview-toolbar { padding: 8px 12px; flex-wrap: wrap; }
      .doc-paper { padding: 24px 16px; }
      .btn { padding: 6px 12px; font-size: 12px; }
    }
  </style>
</head>

<body>

  <!-- 툴바 -->
  <div class="preview-toolbar">
    <div class="toolbar-left">
      <button class="btn btn-back" id="btn-back">← 뒤로</button>
      <span class="toolbar-title">문서 미리보기</span>
      <span class="badge badge-draft" id="status-badge">임시저장</span>
    </div>
    <div class="toolbar-right">
      <button class="btn btn-edit"     id="btn-edit">✏️ 편집</button>
      <button class="btn btn-copy"     id="btn-copy">📋 복사</button>
      <button class="btn btn-print"    id="btn-print">🖨️ 인쇄</button>
      <button class="btn btn-complete" id="btn-complete">✅ 완성저장</button>
      <button class="btn btn-delete"   id="btn-delete">🗑️ 삭제</button>
    </div>
  </div>

  <!-- 미리보기 영역 -->
  <div class="preview-wrapper">
    <div class="doc-paper">
      <div id="doc-preview">
        <p style="color:#aaa; text-align:center; padding:60px 0;">문서를 불러오는 중...</p>
      </div>
    </div>
  </div>

  <!-- 스크립트 -->
  <script src="data/rules.js"></script>
  <script src="data/templates.js"></script>
  <script src="js/common.js"></script>
  <script src="js/preview.js"></script>

</body>
</html>
